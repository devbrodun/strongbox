events {}

http {
  upstream strongbox_nodes {
    server node1:8200;
    server node2:8200;
    server node3:8200;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://strongbox_nodes;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }
  }
}
