# nginx/nginx.conf — TLS reverse proxy for 3-node StrongBox cluster
# OWNER: Person 4 (Cluster, HTTP & Infrastructure)

events { worker_connections 1024; }

http {
    upstream strongbox {
        server node1:8200 max_fails=3 fail_timeout=10s;
        server node2:8201 max_fails=3 fail_timeout=10s;
        server node3:8202 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/ssl/strongbox.crt;
        ssl_certificate_key /etc/nginx/ssl/strongbox.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://strongbox;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }
}
